<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule</title>
<link rel="stylesheet" href="css/style.css">
<style>

/* ── Page layout ─────────────────────────────────────── */
.events-container {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  justify-content: center;
  align-items: flex-start;
  margin-top: 30px;
  padding: 0 16px 40px;
}

/* ── Register interest box ───────────────────────────── */
.signup-box {
  flex: 1 1 300px;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.signup-box input {
  width: 95%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}
.submit-btn {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 12px;
  width: 95%;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
  font-size: 14px;
  margin-top: 4px;
}
.submit-btn:hover { opacity: 0.87; }
.success { margin-top: 10px; font-weight: bold; }

/* ── Right column (schedule docs + event gallery) ─────── */
.right-column {
  flex: 2 1 500px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

/* ── Schedule documents section ─────────────────────── */
.schedule-section h2,
.gallery-wrapper h2 {
  margin-bottom: 12px;
}

.schedule-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

/* Image card */
.sched-card {
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s;
  text-align: center;
}
.sched-card:hover {
  box-shadow: 0 6px 18px rgba(0,0,0,0.14);
  transform: translateY(-3px);
}
.sched-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  display: block;
}
.sched-card .sched-label {
  font-size: 12px;
  color: #444;
  padding: 6px 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* PDF card */
.sched-card.pdf-card img {
  object-fit: contain;
  background: #f5f5f5;
  padding: 10px;
}

/* Loading / empty states */
.sched-loading {
  color: #888;
  font-size: 14px;
  padding: 10px 0;
}

/* Lightbox overlay for images */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 3000;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 12px;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 92vw;
  max-height: 82vh;
  border-radius: 8px;
  object-fit: contain;
}
#lightbox-close {
  position: absolute;
  top: 14px; right: 18px;
  color: white;
  font-size: 32px;
  cursor: pointer;
  font-weight: bold;
  line-height: 1;
}
#lightbox-close:hover { color: #f44; }
#lightbox-caption {
  color: #ddd;
  font-size: 13px;
}

/* ── Event gallery ───────────────────────────────────── */
.gallery-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
}
.gallery-frame {
  width: 100%;
  max-width: 850px;
  height: min(60vh, 480px);
  background: #111;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.gallery-frame img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.gallery-container button {
  font-size: 26px;
  padding: 14px 18px;
  cursor: pointer;
  background: white;
  border-radius: 50%;
  border: 1px solid #ddd;
  flex-shrink: 0;
}

@media (max-width: 600px) {
  .schedule-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="schedule.html">Schedule</a>
  <a href="services.html">Services</a>
  <a href="index.html#bookings">Bookings</a>
  <a href="about.html">About Us</a>
</nav>

<main class="schedule">
<div class="events-container">

  <!-- ── Left: Register Interest ──────────────────────── -->
  <div class="signup-box">
    <h2>Register Interest</h2>
    <form id="signupForm">
      <input type="text"  id="name"  placeholder="Your Name"  required>
      <input type="email" id="email" placeholder="Your Email" required>
      <button class="submit-btn" type="submit">Submit</button>
      <div class="success" id="msg"></div>
    </form>
  </div>

  <!-- ── Right: Schedule docs + Event gallery ─────────── -->
  <div class="right-column">

    <!-- Event Grid (images + PDFs from media/Events) -->
    <div class="schedule-section">
      <h2>📸 Events &amp; Gallery</h2>
      <div id="schedule-grid" class="schedule-grid">
        <p class="sched-loading">Loading events…</p>
      </div>
    </div>

    <!-- Large image slider (synced with grid above) -->
    <div class="gallery-wrapper">
      <h2>🖼 Full View</h2>
      <div class="gallery-container">
        <button id="prevBtn">&#9664;</button>
        <div class="gallery-frame">
          <img id="galleryImage" alt="Event Photo">
        </div>
        <button id="nextBtn">&#9654;</button>
      </div>
    </div>

  </div>
</div>
</main>

<!-- Lightbox for full-size schedule images -->
<div id="lightbox">
  <span id="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const GH_USER          = "yogandrea";
const GH_REPO          = "Wellness";
const EVENTS_FOLDER    = "media/Events";

const IMAGE_EXTS = [".jpg", ".jpeg", ".png", ".webp"];
const PDF_EXT    = ".pdf";
const PDF_ICON   = "https://upload.wikimedia.org/wikipedia/commons/8/87/PDF_file_icon.svg";

// Use shared ghFetch from main.js (includes auth token + rate limit handling)
// Falls back to bare fetch if main.js hasn't loaded yet (shouldn't happen)
async function ghFetch(folder) {
  if (window.ghFetch && window.ghFetch !== ghFetch) return window.ghFetch(folder);
  const headers = { "Accept": "application/vnd.github+json" };
  if (window.GH_TOKEN) headers["Authorization"] = `Bearer ${window.GH_TOKEN}`;
  const res = await fetch(
    `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${folder}`,
    { headers }
  );
  if (!res.ok) throw new Error(`GitHub API ${res.status} for "${folder}"`);
  return res.json();
}

// ============================================================
// 1. EVENT GRID — shows ALL images + PDFs from media/Events
//    as a browsable thumbnail grid (replaces separate schedule)
// ============================================================
let galleryImages = [];   // image-only subset for the lightbox nav
let galleryIndex  = 0;

async function loadEventsGrid() {
  const grid = document.getElementById("schedule-grid");
  try {
    const files = await ghFetch(EVENTS_FOLDER);
    const items = files.filter(f => {
      const n = f.name.toLowerCase();
      return IMAGE_EXTS.some(e => n.endsWith(e)) || n.endsWith(PDF_EXT);
    });

    // Also populate the image-only array for prev/next gallery nav
    galleryImages = items.filter(f => IMAGE_EXTS.some(e => f.name.toLowerCase().endsWith(e)));

    if (items.length === 0) {
      grid.innerHTML = `<p class="sched-loading">No event files found in <code>${EVENTS_FOLDER}</code>.</p>`;
      document.querySelector(".gallery-wrapper").style.display = "none";
      return;
    }

    grid.innerHTML = "";
    items.forEach(f => {
      const isPdf = f.name.toLowerCase().endsWith(PDF_EXT);
      const card  = document.createElement("div");
      card.className = "sched-card" + (isPdf ? " pdf-card" : "");

      const thumb = isPdf ? PDF_ICON : f.download_url;
      card.innerHTML = `
        <img src="${thumb}" alt="${f.name}" loading="lazy">
        <div class="sched-label" title="${f.name}">${f.name}</div>
      `;

      card.addEventListener("click", () => {
        if (isPdf) {
          window.open(f.download_url, "_blank");
        } else {
          // Open in lightbox AND sync the gallery slider to this image
          const imgIdx = galleryImages.findIndex(g => g.name === f.name);
          if (imgIdx !== -1) { galleryIndex = imgIdx; showGalleryImage(galleryIndex); }
          openLightbox(f.download_url, f.name);
        }
      });

      grid.appendChild(card);
    });

    // Show first image in the slider too
    if (galleryImages.length > 0) showGalleryImage(0);
    else document.querySelector(".gallery-wrapper").style.display = "none";

  } catch (err) {
    grid.innerHTML = `<p class="sched-loading" style="color:#c00;">
      ⚠️ Could not load events: ${err.message}
    </p>`;
    console.error("[Events]", err);
  }
}

function showGalleryImage(i) {
  const img = document.getElementById("galleryImage");
  if (galleryImages[i]) img.src = galleryImages[i].download_url;
}

document.getElementById("prevBtn").onclick = () => {
  galleryIndex = (galleryIndex - 1 + galleryImages.length) % galleryImages.length;
  showGalleryImage(galleryIndex);
};
document.getElementById("nextBtn").onclick = () => {
  galleryIndex = (galleryIndex + 1) % galleryImages.length;
  showGalleryImage(galleryIndex);
};

// Swipe support
let swipeStartX = 0;
const galImg = document.getElementById("galleryImage");
galImg.addEventListener("touchstart", e => { swipeStartX = e.touches[0].clientX; });
galImg.addEventListener("touchend",   e => {
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (Math.abs(dx) > 40) {
    if (dx > 0) document.getElementById("prevBtn").click();
    else        document.getElementById("nextBtn").click();
  }
});
galImg.addEventListener("click", () => {
  if (galleryImages[galleryIndex]) openLightbox(galleryImages[galleryIndex].download_url, galleryImages[galleryIndex].name);
});

// ============================================================
// Lightbox
// ============================================================
function openLightbox(src, name) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox-caption").innerText = name;
  document.getElementById("lightbox").classList.add("open");
}
document.getElementById("lightbox-close").onclick = closeLightbox;
document.getElementById("lightbox").addEventListener("click", e => {
  if (e.target === document.getElementById("lightbox")) closeLightbox();
});
document.addEventListener("keydown", e => {
  if (!document.getElementById("lightbox").classList.contains("open")) return;
  if (e.key === "ArrowRight" && galleryImages.length) {
    galleryIndex = (galleryIndex + 1) % galleryImages.length;
    showGalleryImage(galleryIndex);
    openLightbox(galleryImages[galleryIndex].download_url, galleryImages[galleryIndex].name);
  }
  if (e.key === "ArrowLeft" && galleryImages.length) {
    galleryIndex = (galleryIndex - 1 + galleryImages.length) % galleryImages.length;
    showGalleryImage(galleryIndex);
    openLightbox(galleryImages[galleryIndex].download_url, galleryImages[galleryIndex].name);
  }
  if (e.key === "Escape") closeLightbox();
});
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lightbox-img").src = "";
}

// ============================================================
// 3. GOOGLE SHEET SIGNUP
// ============================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynn2lIa8I--zwis12YttudV00gPyZXmAsW_m8h1z14o3zfj1ScMK76Q6ZKl7UySo1N/exec";

document.getElementById("signupForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const name  = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const msg   = document.getElementById("msg");

  if (!name || !email) { msg.innerText = "Please fill all fields"; msg.style.color = "red"; return; }

  msg.innerText = "Submitting…"; msg.style.color = "black";
  try {
    await fetch(SCRIPT_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, page: "schedule" })
    });
    msg.innerText = "Registration received ✔"; msg.style.color = "green";
    this.reset();
  } catch {
    msg.innerText = "Submission failed ❌"; msg.style.color = "red";
  }
});

// ============================================================
// Init
// ============================================================
loadEventsGrid();   // loads media/Events into both grid + slider
</script>
</body>
</html>
